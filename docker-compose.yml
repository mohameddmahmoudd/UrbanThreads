services:
  postgres:
    image: postgres:16-alpine
    container_name: urbanthreads-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: urbanthreads
      POSTGRES_PASSWORD: urbanthreads_dev
      POSTGRES_DB: UrbanThreadsDB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanthreads -d UrbanThreadsDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gameball-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gameball-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env.docker
    environment:
      PORT: 3000
    depends_on:
      - backend

volumes:
  pgdata:
